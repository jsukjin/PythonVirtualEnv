services:
  python_app:
    build: .
    container_name: python_blog_search
    restart: always
    env_file:
      - .env
    ports:
      - "5005:5000"
    command: python -m uvicorn main:app --host 0.0.0.0 --port 5000 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - n8n_personal

networks:
  n8n_personal:
    external: true